name = "prutopia-ai-workers"
main = "src/index.js"
compatibility_date = "2026-06-25"

# ── Cron Trigger : rotation auto des défis ──
# S'exécute toutes les heures. La fonction Postgres cron_rotate_if_due ne
# tourne réellement le défi que si l'échéance (next_rotation) est atteinte et
# le planning activé — donc une vérif horaire suffit quelle que soit la
# fréquence choisie (quotidienne, hebdo…).
[triggers]
crons = ["0 * * * *"]

# ── Secrets ──
# En déploiement GitHub (sans Node local), les secrets se posent dans le
# DASHBOARD Cloudflare du Worker :
#   Workers & Pages → (ce worker) → Settings → Variables and Secrets
# Variables à créer (type "Secret") :
#   ANTHROPIC_API_KEY     → ta clé Anthropic
#   WORKER_SHARED_SECRET  → le même secret que côté app
#   SUPABASE_URL          → https://xxxx.supabase.co
#   SUPABASE_SECRET_KEY   → sb_secret_...
